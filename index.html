<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Data Terdistribusi</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #fdf5f6;
            color: #333;
            margin: 0;
            padding: 40px 20px;
        }
        .container {
            max-width: 1000px;
            margin: auto;
            background: #ffffff;
            padding: 30px 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        h1 {
            text-align: center;
            color: #d81b60;
            border-bottom: 2px solid #f8bbd0;
            padding-bottom: 15px;
            margin-bottom: 30px;
        }
        h2 {
            color: #ad1457;
            margin-top: 40px;
            font-size: 1.2rem;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
        }
        th, td {
            padding: 15px;
            text-align: left;
        }
        th {
            background-color: #f8bbd0;
            color: #880e4f;
            font-weight: 600;
        }
        tr {
            border-bottom: 1px solid #f0f0f0;
        }
        tr:nth-of-type(even) {
            background-color: #fffafa;
        }
        tr:hover {
            background-color: #fce4ec;
            transition: 0.3s;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Tugas Komputer Terdistribusi Individu</h1>

        <h2>Tabel Mahasiswa</h2>
        <table>
            <thead><tr><th>NIM</th><th>Nama</th><th>Alamat</th></tr></thead>
            <tbody id="tabel-mahasiswa"></tbody>
        </table>

        <h2>Tabel Dosen</h2>
        <table>
            <thead><tr><th>NIP</th><th>Nama</th><th>Alamat</th></tr></thead>
            <tbody id="tabel-dosen"></tbody>
        </table>

        <h2>Tabel Mata Kuliah</h2>
        <table>
            <thead><tr><th>Kode</th><th>Mata Kuliah</th><th>SKS</th><th>Semester</th></tr></thead>
            <tbody id="tabel-matakuliah"></tbody>
        </table>

        <h2>Tabel Perkuliahan</h2>
        <table>
            <thead><tr><th>ID</th><th>NIM</th><th>NIP</th><th>Kode MK</th><th>Nilai</th></tr></thead>
            <tbody id="tabel-perkuliahan"></tbody>
        </table>
    </div>

    <script>
        const BASE_URL = 'http://localhost:3000/api';

        async function loadData(endpoint, tableBodyId, columns) {
            try {
                const response = await fetch(`${BASE_URL}/${endpoint}`);
                const data = await response.json();
                const tableBody = document.getElementById(tableBodyId);

                data.forEach(row => {
                    const tr = document.createElement('tr');
                    columns.forEach(col => {
                        const td = document.createElement('td');
                        td.textContent = row[col];
                        tr.appendChild(td);
                    });
                    tableBody.appendChild(tr);
                });
            } catch (error) {
                console.error(`Gagal memuat data [${endpoint}]:`, error);
            }
        }

        loadData('mahasiswa',   'tabel-mahasiswa',   ['nim', 'nama', 'alamat']);
        loadData('dosen',       'tabel-dosen',       ['nip', 'nama', 'alamat']);
        loadData('matakuliah',  'tabel-matakuliah',  ['kode', 'matkul', 'sks', 'smt']);
        loadData('perkuliahan', 'tabel-perkuliahan', ['id', 'nim', 'nip', 'kode', 'nilai']);
    </script>

</body>
</html>
